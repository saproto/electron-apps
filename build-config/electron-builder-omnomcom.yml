appId: com.electron.omnomcom
desktopName: com.electron.omnomcom.desktop
productName: omnomcom

files:
  - "package.json"
  - "main.js"
  - "preload.js"
  - "*.json"
  - "node_modules/**/*"
  - "resources/**/*"
  - "dist/**/*"

directories:
  buildResources: resources/omnomcom

win:
  target: nsis
  icon: resources/omnomcom/omnomcom.ico

artifactName: "${productName}-${version}-${os}.${ext}"

linux:
  target:
    - AppImage
    - deb
  category: Utility
  icon: resources/omnomcom/omnomcom.png
  syncDesktopName: true

publish:
  - provider: github
    owner: saproto
    repo: Hydra
    channel: omnomcom
