appId: com.electron.three-little-pigs
desktopName: com.electron.three-little-pigs.desktop
productName: three-little-pigs

files:
  - "package.json"
  - "main.js"
  - "preload.js"
  - "*.json"
  - "node_modules/**/*"
  - "resources/**/*"
  - "dist/**/*"

directories:
  buildResources: resources/three-little-pigs

win:
  target: nsis

artifactName: "${productName}-${version}-${os}.${ext}"

linux:
  target:
    - AppImage
    - deb
  category: Utility
  syncDesktopName: true

publish:
  - provider: github
    owner: saproto
    repo: Hydra
    channel: latest
